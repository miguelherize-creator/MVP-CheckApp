services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: checkapp
      POSTGRES_PASSWORD: checkapp
      POSTGRES_DB: checkapp
    ports:
      - '5432:5432'
    volumes:
      - checkapp_pg_data:/var/lib/postgresql/data

volumes:
  checkapp_pg_data:
